<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>可変ルーレット</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }
    .controls {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px 25px;
      border-radius: 15px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(5px);
    }
    input[type="number"] {
      width: 80px;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #f5576c;
      font-size: 1.2rem;
      text-align: center;
      background: #fff;
      color: #333;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }
    #wheelContainer {
      position: relative;
      width: 85vw;
      max-width: 420px;
      aspect-ratio: 1/1;
      display: block;
    }
    canvas { 
      width: 100%; 
      height: 100%; 
      filter: drop-shadow(0 5px 25px rgba(0, 0, 0, 0.6)); 
    }
    #spinBtn {
      margin-top: 20px;
      padding: 14px 60px;
      font-size: 1.3rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
      transition: transform 0.1s;
    }
    #spinBtn:active { transform: scale(0.95); }
    #spinBtn:disabled, input:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { margin-top: 15px; font-size: 1.2rem; height: 60px; text-align: center; }
    .number { font-size: 3rem; font-weight: bold; color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
  </style>
</head>
<body>

  <h1>🎰 カスタムルーレット</h1>

  <div class="controls">
    <label for="segInput">参加人数 (2〜50):</label>
    <input type="number" id="segInput" value="12" min="2" max="50">
  </div>

  <div id="wheelContainer">
    <canvas id="wheel" width="500" height="520"></canvas>
  </div>

  <button id="spinBtn">スピン！</button>
  <div id="result"></div>

  <script>
  window.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const segInput = document.getElementById('segInput');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');

    const cx = canvas.width / 2;
    const cy = canvas.width / 2;
    const radius = canvas.width * 0.45;
    let angle = -Math.PI / 2;
    let isSpinning = false;

    const palette = [
      '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd',
      '#ff9f43', '#54a0ff', '#00d2d3', '#ee5253', '#10ac84',
      '#341f97', '#ff7f50', '#2ecc71', '#9b59b6', '#e67e22'
    ];

    function sanitizeSegments(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return 12;
      return Math.min(50, Math.max(2, Math.floor(n)));
    }

    function drawPointer() {
      const topY = cy - radius - 8;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(cx, topY - 20);
      ctx.lineTo(cx - 14, topY + 8);
      ctx.lineTo(cx + 14, topY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawWheel(segments) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const arc = (Math.PI * 2) / segments;

      for (let i = 0; i < segments; i++) {
        const start = angle + i * arc;
        const end = start + arc;
        const mid = start + arc / 2;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i % palette.length];
        ctx.fill();

        const labelRadius = radius * 0.7;
        const labelX = cx + Math.cos(mid) * labelRadius;
        const labelY = cy + Math.sin(mid) * labelRadius;

        ctx.save();
        ctx.translate(labelX, labelY);
        ctx.rotate(mid + Math.PI / 2);
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.lineWidth = 3;
        ctx.font = 'bold 26px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        const label = String(i + 2);
        ctx.strokeText(label, 0, 0);
        ctx.fillText(label, 0, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      drawPointer();
    }

    function getWinningNumber(segments) {
      const arc = (Math.PI * 2) / segments;
      let normalized = angle % (Math.PI * 2);
      if (normalized < 0) normalized += Math.PI * 2;

      const pointerAt = -Math.PI / 2;
      let relative = (pointerAt - normalized) % (Math.PI * 2);
      if (relative < 0) relative += Math.PI * 2;

      const index = Math.floor(relative / arc) % segments;
      return index + 2;
    }

    function spin() {
      if (isSpinning) return;

      const fixedSegments = sanitizeSegments(segInput.value);
      segInput.value = String(fixedSegments);

      isSpinning = true;
      segInput.disabled = true;
      spinBtn.disabled = true;
      result.textContent = '回転中…';

      const startAngle = angle;
      const extraTurns = 6 + Math.random() * 2;
      const targetOffset = Math.random() * Math.PI * 2;
      const targetAngle = startAngle + extraTurns * Math.PI * 2 + targetOffset;
      const duration = 4200;
      const startTime = performance.now();

      function animate(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 4);
        angle = startAngle + (targetAngle - startAngle) * eased;
        drawWheel(fixedSegments - 1);

        if (t < 1) {
          requestAnimationFrame(animate);
          return;
        }

        const winner = getWinningNumber(fixedSegments - 1);
        result.innerHTML = `最終決定: <span class="number">${winner}</span>`;
        isSpinning = false;
        segInput.disabled = false;
        spinBtn.disabled = false;
      }

      requestAnimationFrame(animate);
    }

    segInput.addEventListener('input', () => {
      if (isSpinning) return;
      const segments = sanitizeSegments(segInput.value);
      drawWheel(segments - 1);
      result.textContent = '';
    });

    spinBtn.addEventListener('click', spin);

    segInput.value = '12';
    drawWheel(11);
  });
  </script>
</body>
</html>
